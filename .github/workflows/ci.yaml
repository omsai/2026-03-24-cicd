---
name: My CI workflow

on:                             # yamllint disable-line rule:truthy
  push:
    branches:
      - main
  pull_request:
  # To run workflows manually.  For example, you might want to update
  # your publications on a website every few months.
  workflow_dispatch:

jobs:

  test:
    name: Test the python package
    strategy:
      matrix:
        python-version: ["3.10", "3.14"]
        platform: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - python-version: "3.13"
            platform: "macos-15"
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6
      - name: Setup a specific version of python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install the package to run the tests
        run: pip install .[test]
      - name: Pass information to a step
        id: sender-step
        run: echo "message='Using Python ${{ matrix.python-version }}'" >> $GITHUB_OUTPUT
      - if: matrix.python-version == '3.14'
        name: Conditional step
        run: echo ${{ steps.sender-step.output.message }}
      - name: Run the tests
        run: pytest -vv
